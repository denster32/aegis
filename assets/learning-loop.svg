<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" role="img" aria-label="Learning loop">
  <rect width="720" height="240" fill="#000000" rx="0"/>
  <g font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" fill="#ffffff">
    <!-- nodes -->
    <rect x="36" y="84" width="118" height="52" rx="2" fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="1.5"/>
    <text x="95" y="115" text-anchor="middle" letter-spacing="0.12em" font-size="13">RUN</text>

    <line x1="154" y1="110" x2="198" y2="110" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1"/>
    <polygon points="198,110 190,106 190,114" fill="#ffffff" fill-opacity="0.55"/>

    <rect x="204" y="84" width="118" height="52" rx="2" fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="1.5"/>
    <text x="263" y="115" text-anchor="middle" letter-spacing="0.12em" font-size="13">HEAL</text>

    <line x1="322" y1="110" x2="366" y2="110" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1"/>
    <polygon points="366,110 358,106 358,114" fill="#ffffff" fill-opacity="0.55"/>

    <rect x="372" y="84" width="118" height="52" rx="2" fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="1.5"/>
    <text x="431" y="115" text-anchor="middle" letter-spacing="0.12em" font-size="13">REFLECT</text>

    <line x1="490" y1="110" x2="534" y2="110" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1"/>
    <polygon points="534,110 526,106 526,114" fill="#ffffff" fill-opacity="0.55"/>

    <rect x="540" y="84" width="140" height="52" rx="2" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-width="1.5"/>
    <text x="610" y="115" text-anchor="middle" letter-spacing="0.12em" font-size="13">MEMORY</text>

    <!-- feedback path -->
    <path d="M610 136 V176 H95 V136" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="360" y="208" text-anchor="middle" fill="#ffffff" fill-opacity="0.4" font-size="12" letter-spacing="0.16em">
      NEXT RUN INJECTS LESSONS
    </text>
  </g>
</svg>
