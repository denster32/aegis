<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="Aegis banner">
  <rect width="1200" height="320" fill="#000000"/>
  <!-- subtle grid (xAI technical field) -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 80 H1200 M0 160 H1200 M0 240 H1200"/>
    <path d="M200 0 V320 M400 0 V320 M600 0 V320 M800 0 V320 M1000 0 V320"/>
  </g>
  <!-- thin horizon -->
  <line x1="0" y1="319" x2="1200" y2="319" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <!-- shield -->
  <path d="M100 70 L180 100 V160 C180 205 145 238 100 252 C55 238 20 205 20 160 V100 Z"
        fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M100 88 L162 112 V160 C162 192 136 216 100 228 C64 216 38 192 38 160 V112 Z"
