<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Aegis">
  <!-- SpaceX / xAI monochrome mark: void black, white geometry -->
  <rect width="256" height="256" rx="40" fill="#000000"/>
  <!-- thin outer frame -->
  <rect x="18" y="18" width="220" height="220" rx="28" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <!-- shield outline -->
  <path d="M128 44 L204 74 V132 C204 178 168 210 128 226 C88 210 52 178 52 132 V74 Z"
        fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- inner shield fill (near-void) -->
  <path d="M128 58 L188 82 V132 C188 168 160 194 128 208 C96 194 68 168 68 132 V82 Z"
        fill="#0a0a0a" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
  <!-- A monogram -->
  <path d="M96 176 L128 92 L160 176 M110 148 H146"
        fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- micro accent: single horizontal rule under A -->
  <line x1="88" y1="192" x2="168" y2="192" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1"/>
</svg>
