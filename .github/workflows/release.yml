name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p aegis --locked

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/aegis dist/aegis-x86_64-unknown-linux-gnu
          chmod +x dist/aegis-x86_64-unknown-linux-gnu
          (cd dist && sha256sum aegis-x86_64-unknown-linux-gnu > SHA256SUMS)

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/aegis-x86_64-unknown-linux-gnu
            dist/SHA256SUMS
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
